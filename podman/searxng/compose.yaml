version: "3.8"

services:
  redis:
    container_name: redis
    image: docker.io/library/redis:7-bookworm
    command: ["redis-server", "--save", "30", "1", "--loglevel", "warning"]
    restart: unless-stopped
    network_mode: host
    # platform linux
    platform: linux/amd64
    # os linux
    os: linux
    volumes:
      - valkey-data2:/data

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    network_mode: host
    # platform linux
    platform: linux/amd64
    # os linux
    os: linux
    volumes:
      - ${HOME}/podman/searxng:/etc/searxng:rw
      - ./searxng-genkey:/usr/local/bin/searxng-genkey
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      # Use 127.0.0.1 because network_mode: host shares the interface
      - SEARXNG_REDIS_URL=redis://127.0.0.1:6379/0
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS:-4}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS:-4}

networks:
  searxng:

volumes:
  searxng_config:
  valkey-data2:
